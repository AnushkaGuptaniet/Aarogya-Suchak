<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - Aarogya Suchak</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="signup-container">

  <!-- LEFT SIDE -->
  <div class="signup-left">
    <h1>Join Aarogya Suchak</h1>
    <p>Your AI Powered Health Assistant</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="signup-right">

    <div class="signup-card">

      <h2>Create Account</h2>

      <form onsubmit="signupUser(); return false;">

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Create password" required>
        </div>

        <button class="signup-btn" onclick="signupUser()" type="submit">Sign Up</button>

      </form>

      <p class="login-text">
        Already have an account? <a href="login.html">Login</a>
      </p>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
